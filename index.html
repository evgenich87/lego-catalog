<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

  :root {
    --bg: #F7F4EE;
    --ink: #1A1A18;
    --ink-soft: #5C5A52;
    --line: #E2DDD0;
    --card: #FFFFFF;
    --yellow: #FFD500;
    --yellow-deep: #E6B800;
    --red: #D0102A;
    --blue: #0058A3;
    --green: #1C7A3C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ===== HEADER ===== */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg);
    border-bottom: 2px solid var(--ink);
    padding: 18px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 36px; height: 36px; background: var(--red);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.25);
  }
  .brand-mark::before { content: ''; width: 14px; height: 14px; background: var(--yellow); border-radius: 50%; }
  .brand-text { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  .brand-sub { font-size: 11px; color: var(--ink-soft); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
  .count-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 700;
    background: var(--ink); color: var(--bg);
    padding: 6px 12px; border-radius: 20px;
  }
  .search-box {
    flex: 1; min-width: 200px; max-width: 320px;
    padding: 9px 14px; border: 1.5px solid var(--line); border-radius: 8px;
    font-family: 'Inter', sans-serif; font-size: 14px; background: var(--card);
  }
  .search-box:focus { outline: none; border-color: var(--ink); }

  /* ===== LAYOUT ===== */
  .layout { display: flex; max-width: 1400px; margin: 0 auto; }

  .filters {
    width: 230px; flex-shrink: 0;
    padding: 24px 18px;
    position: sticky; top: 73px; height: fit-content;
    max-height: calc(100vh - 73px); overflow-y: auto;
  }
  .filter-group { margin-bottom: 26px; }
  .filter-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--ink-soft); margin-bottom: 10px;
  }
  .filter-opt {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 10px; border-radius: 6px; cursor: pointer;
    font-size: 13.5px; color: var(--ink); margin-bottom: 2px;
    transition: background 0.12s;
  }
  .filter-opt:hover { background: var(--line); }
  .filter-opt.active { background: var(--ink); color: var(--bg); }
  .filter-opt .n { font-family: 'JetBrains Mono', monospace; font-size: 11px; opacity: 0.55; }
  .filter-opt.active .n { opacity: 0.7; }
  .reset-btn {
    font-size: 12px; color: var(--red); font-weight: 600; cursor: pointer;
    border: none; background: none; padding: 4px 0; text-decoration: underline;
  }

  .main { flex: 1; padding: 24px; min-width: 0; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }

  /* ===== CARD ===== */
  .card {
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    display: flex; flex-direction: column;
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 10px 24px rgba(0,0,0,0.08); }

  .card-img-wrap {
    position: relative;
    aspect-ratio: 4/3;
    background: #EDE9DE;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }
  .set-badge {
    position: absolute; top: 10px; left: 10px;
    background: var(--yellow); color: var(--ink);
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 12.5px;
    padding: 4px 9px; border-radius: 6px;
    box-shadow: inset 0 -2px 0 var(--yellow-deep);
  }
  .status-badge {
    position: absolute; top: 10px; right: 10px;
    font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.03em;
  }
  .status-active { background: #DCF0E0; color: var(--green); }
  .status-retired { background: #F3E1E1; color: var(--red); }

  .card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .card-theme { font-size: 10.5px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.04em; }
  .card-title { font-size: 16px; font-weight: 700; line-height: 1.25; letter-spacing: -0.01em; }
  .card-meta { display: flex; gap: 12px; font-size: 12.5px; color: var(--ink-soft); flex-wrap: wrap; }
  .card-meta b { color: var(--ink); font-weight: 600; }

  .card-prices {
    margin-top: auto; padding-top: 10px; border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .price-block { font-size: 11px; color: var(--ink-soft); }
  .price-block .val { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--ink); display: block; }
  .price-block.resale .val { color: var(--green); }
  .instr-link {
    font-size: 11.5px; font-weight: 600; color: var(--blue);
    text-decoration: none; border-bottom: 1.5px solid currentColor; padding-bottom: 1px;
  }

  .empty-state {
    text-align: center; padding: 80px 20px; color: var(--ink-soft);
  }
  .empty-state .big { font-size: 40px; margin-bottom: 12px; }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(20,18,14,0.55);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); border-radius: 18px; max-width: 560px; width: 100%;
    max-height: 88vh; overflow-y: auto; position: relative;
  }
  .modal-close {
    position: absolute; top: 14px; right: 14px; z-index: 5;
    width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.9);
    border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .modal-img { width: 100%; aspect-ratio: 16/10; background: #EDE9DE; display: flex; align-items: center; justify-content: center; }
  .modal-img img { width: 100%; height: 100%; object-fit: contain; padding: 24px; }
  .modal-body { padding: 22px 26px 28px; }
  .modal-theme { font-size: 11px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.05em; }
  .modal-title { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin: 6px 0 14px; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .stat-box { background: var(--bg); border-radius: 10px; padding: 10px 12px; }
  .stat-label { font-size: 10.5px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.04em; }
  .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; margin-top: 2px; }
  .modal-desc { font-size: 14px; line-height: 1.6; color: #3a3833; margin-bottom: 18px; }
  .modal-footer { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-instr {
    flex: 1; text-align: center; padding: 11px; border-radius: 10px;
    background: var(--ink); color: var(--bg); text-decoration: none;
    font-size: 13.5px; font-weight: 600;
  }

  @media (max-width: 860px) {
    .layout { flex-direction: column; }
    .filters {
      width: 100%; position: static; max-height: none;
      display: flex; gap: 18px; overflow-x: auto; padding: 16px;
      border-bottom: 1px solid var(--line);
    }
    .filter-group { margin-bottom: 0; flex-shrink: 0; min-width: 140px; }
  }
</style>
</head>

let activeFilters = { theme: null, year: null, status: null };
let searchQuery = '';

function buildFilters() {
  const themes = [...new Set(SETS.map(s => s.theme))].sort();
  const years = [...new Set(SETS.map(s => s.year))].sort((a,b) => b-a);
  const statuses = [
    { key: 'active', label: 'В наличии' },
    { key: 'retired', label: 'Снят с продажи' }
  ];

  document.getElementById('themeFilters').innerHTML = themes.map(t => {
    const count = SETS.filter(s => s.theme === t).length;
    return `<div class="filter-opt" data-type="theme" data-val="${t}" onclick="toggleFilter('theme','${t}')">
      <span>${t}</span><span class="n">${count}</span>
    </div>`;
  }).join('');

  document.getElementById('yearFilters').innerHTML = years.map(y => {
    const count = SETS.filter(s => s.year === y).length;
    return `<div class="filter-opt" data-type="year" data-val="${y}" onclick="toggleFilter('year',${y})">
      <span>${y}</span><span class="n">${count}</span>
    </div>`;
  }).join('');

  document.getElementById('statusFilters').innerHTML = statuses.map(st => {
    const count = SETS.filter(s => s.status === st.key).length;
    return `<div class="filter-opt" data-type="status" data-val="${st.key}" onclick="toggleFilter('status','${st.key}')">
      <span>${st.label}</span><span class="n">${count}</span>
    </div>`;
  }).join('');
}

function toggleFilter(type, val) {
  activeFilters[type] = activeFilters[type] === val ? null : val;
  render();
}

function resetFilters() {
  activeFilters = { theme: null, year: null, status: null };
  document.getElementById('searchBox').value = '';
  searchQuery = '';
  render();
}

function getFiltered() {
  return SETS.filter(s => {
    if (activeFilters.theme && s.theme !== activeFilters.theme) return false;
    if (activeFilters.year && s.year !== activeFilters.year) return false;
    if (activeFilters.status && s.status !== activeFilters.status) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (!s.num.includes(q) && !s.name.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function render() {
  // update filter active states
  document.querySelectorAll('.filter-opt').forEach(el => {
    const type = el.dataset.type;
    const val = el.dataset.val;
    const isActive = type === 'year'
      ? activeFilters[type] == val
      : activeFilters[type] === val;
    el.classList.toggle('active', isActive);
  });

  const filtered = getFiltered();
  document.getElementById('countPill').textContent = `${filtered.length} ${pluralSets(filtered.length)}`;

  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  grid.style.display = 'grid';
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(s => `
    <div class="card" onclick="openModal('${s.num}')">
      <div class="card-img-wrap">
        <div class="set-badge">#${s.num}</div>
        <div class="status-badge ${s.status === 'active' ? 'status-active' : 'status-retired'}">
          ${s.status === 'active' ? 'В наличии' : 'Снят'}
        </div>
        <img src="${s.img}" alt="${s.name}" loading="lazy" onerror="this.style.display='none'">
      </div>
      <div class="card-body">
        <div class="card-theme">${s.theme}${s.subtheme !== '—' ? ' · ' + s.subtheme : ''}</div>
        <div class="card-title">${s.name}</div>
        <div class="card-meta">
          <span><b>${s.year}</b></span>
          <span><b>${s.pieces}</b> дет.</span>
          ${s.minifigs > 0 ? `<span><b>${s.minifigs}</b> фигур.</span>` : ''}
        </div>
        <div class="card-prices">
          <div class="price-block">
            При выпуске
            <span class="val">${s.rrp}</span>
          </div>
          <div class="price-block resale">
            Вторичка
            <span class="val">${s.resale}</span>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function pluralSets(n) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return 'набор';
  if ([2,3,4].includes(mod10) && ![12,13,14].includes(mod100)) return 'набора';
  return 'наборов';
}

function openModal(num) {
  const s = SETS.find(x => x.num === num);
  if (!s) return;
  document.getElementById('modalContent').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-img"><img src="${s.img}" alt="${s.name}" onerror="this.style.display='none'"></div>
    <div class="modal-body">
      <div class="modal-theme">${s.theme}${s.subtheme !== '—' ? ' · ' + s.subtheme : ''} · #${s.num}</div>
      <div class="modal-title">${s.name}</div>
      <div class="modal-desc">${s.desc}</div>
      <div class="modal-grid">
        <div class="stat-box"><div class="stat-label">Год выпуска</div><div class="stat-val">${s.year}</div></div>
        <div class="stat-box"><div class="stat-label">Деталей</div><div class="stat-val">${s.pieces}</div></div>
        <div class="stat-box"><div class="stat-label">Минифигурок</div><div class="stat-val">${s.minifigs || '—'}</div></div>
        <div class="stat-box"><div class="stat-label">Возраст</div><div class="stat-val">${s.ageRange}</div></div>
        <div class="stat-box"><div class="stat-label">Цена при выпуске</div><div class="stat-val">${s.rrp}</div></div>
        <div class="stat-box"><div class="stat-label">Цена на вторичке</div><div class="stat-val">${s.resale}</div></div>
      </div>
      <div class="modal-footer">
        <a href="${s.instructions}" target="_blank" class="btn-instr">Инструкция по сборке →</a>
      </div>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('searchBox').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

buildFilters();
render();
</script>

</body>
</html>
